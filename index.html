<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Engebass — Fale com a Larissa</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background: #f5f5f5; height: 100vh; display: flex; flex-direction: column; }

    .header {
      background: linear-gradient(135deg, #1a3a5c 0%, #2c5f8a 100%);
      color: white; padding: 16px 20px; display: flex; align-items: center; gap: 12px;
    }
    .header .avatar {
      width: 40px; height: 40px; border-radius: 50%; background: #fff3;
      display: flex; align-items: center; justify-content: center; font-size: 20px;
    }
    .header .info h1 { font-size: 16px; font-weight: 600; }
    .header .info p { font-size: 12px; opacity: 0.8; }

    .messages {
      flex: 1; overflow-y: auto; padding: 16px; display: flex; flex-direction: column; gap: 8px;
    }
    .msg {
      max-width: 80%; padding: 10px 14px; border-radius: 12px; font-size: 14px;
      line-height: 1.5; word-wrap: break-word; white-space: pre-wrap;
    }
    .msg.bot { background: white; color: #333; align-self: flex-start; border-bottom-left-radius: 4px; box-shadow: 0 1px 2px rgba(0,0,0,0.08); }
    .msg.user { background: #1a3a5c; color: white; align-self: flex-end; border-bottom-right-radius: 4px; }
    .msg.error { background: #fee; color: #c00; align-self: center; font-size: 12px; }
    .typing { align-self: flex-start; background: white; padding: 10px 14px; border-radius: 12px; border-bottom-left-radius: 4px; box-shadow: 0 1px 2px rgba(0,0,0,0.08); }
    .typing span { display: inline-block; width: 8px; height: 8px; background: #999; border-radius: 50%; margin: 0 2px; animation: bounce 1.2s infinite; }
    .typing span:nth-child(2) { animation-delay: 0.2s; }
    .typing span:nth-child(3) { animation-delay: 0.4s; }
    @keyframes bounce { 0%, 60%, 100% { transform: translateY(0); } 30% { transform: translateY(-6px); } }

    .input-area {
      padding: 12px 16px; background: white; border-top: 1px solid #e0e0e0;
      display: flex; gap: 8px; align-items: center;
    }
    .input-area input {
      flex: 1; border: 1px solid #ddd; border-radius: 24px; padding: 10px 16px;
      font-size: 14px; outline: none; transition: border 0.2s;
    }
    .input-area input:focus { border-color: #1a3a5c; }
    .input-area button {
      background: #1a3a5c; color: white; border: none; border-radius: 50%;
      width: 40px; height: 40px; cursor: pointer; font-size: 18px;
      display: flex; align-items: center; justify-content: center; transition: background 0.2s;
    }
    .input-area button:hover { background: #2c5f8a; }
    .input-area button:disabled { background: #ccc; cursor: not-allowed; }

    .meta-form {
      background: white; padding: 20px; margin: 16px; border-radius: 12px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.1);
    }
    .meta-form h2 { font-size: 16px; margin-bottom: 12px; color: #1a3a5c; }
    .meta-form label { display: block; font-size: 13px; color: #666; margin-bottom: 4px; margin-top: 10px; }
    .meta-form input, .meta-form select {
      width: 100%; padding: 8px 12px; border: 1px solid #ddd; border-radius: 8px;
      font-size: 14px; outline: none;
    }
    .meta-form button {
      margin-top: 16px; width: 100%; background: #1a3a5c; color: white;
      border: none; border-radius: 8px; padding: 12px; font-size: 14px;
      cursor: pointer; font-weight: 600;
    }
    .meta-form button:hover { background: #2c5f8a; }
  </style>
</head>
<body>

  <div class="header">
    <div class="avatar">L</div>
    <div class="info">
      <h1>Larissa — Engebass</h1>
      <p>Assistente de Vistoria</p>
    </div>
  </div>

  <!-- Metadata Form (simulates LP form submission) -->
  <div id="metaForm" class="meta-form">
    <h2>Simulador de Lead (Form da LP)</h2>
    <label>Seu nome</label>
    <input type="text" id="metaName" placeholder="Ex: Rodrigo" value="Rodrigo">
    <label>Prazo de entrega</label>
    <select id="metaPrazo">
      <option value="Chaves nos proximos 30 dias">Chaves nos proximos 30 dias</option>
      <option value="Chaves em 60 dias">Chaves em 60 dias</option>
      <option value="Chaves em 90 dias">Chaves em 90 dias</option>
      <option value="Chaves em mais de 90 dias">Mais de 90 dias</option>
    </select>
    <label>Valor do imovel</label>
    <select id="metaValor">
      <option value="R$ 1.200.000">R$ 1.200.000</option>
      <option value="R$ 800.000">R$ 800.000</option>
      <option value="R$ 500.000">R$ 500.000</option>
      <option value="R$ 300.000">R$ 300.000</option>
    </select>
    <label>Empreendimento</label>
    <input type="text" id="metaEmpreendimento" placeholder="Ex: Residencial Aurora" value="Residencial Aurora">
    <button onclick="startChat()">Iniciar conversa</button>
  </div>

  <div id="chatArea" style="display:none; flex:1; display:none; flex-direction:column; overflow:hidden;">
    <div class="messages" id="messages"></div>
    <div class="input-area">
      <input type="text" id="msgInput" placeholder="Digite sua mensagem..." onkeydown="if(event.key==='Enter')sendMessage()">
      <button id="sendBtn" onclick="sendMessage()">&#10148;</button>
    </div>
  </div>

  <script>
    const WEBHOOK_URL = 'https://infusion-revenue-n8n.r3x5w5.easypanel.host/webhook/larissa-vistoria';
    let sessionId = '';
    let metadata = {};

    function startChat() {
      const name = document.getElementById('metaName').value.trim() || 'Visitante';
      sessionId = 'web-' + name.toLowerCase().replace(/\s+/g, '-') + '-' + Date.now();
      metadata = {
        name: name,
        prazo_entrega: document.getElementById('metaPrazo').value,
        valor_imovel: document.getElementById('metaValor').value,
        empreendimento: document.getElementById('metaEmpreendimento').value
      };

      document.getElementById('metaForm').style.display = 'none';
      const chatArea = document.getElementById('chatArea');
      chatArea.style.display = 'flex';

      // Send initial message simulating form submission
      sendToWebhook('Oi, preenchi o formulario de vistoria. Meu nome e ' + metadata.name + '.');
    }

    function addMessage(text, type) {
      const container = document.getElementById('messages');
      const div = document.createElement('div');
      div.className = 'msg ' + type;
      div.textContent = text;
      container.appendChild(div);
      container.scrollTop = container.scrollHeight;
    }

    function showTyping() {
      const container = document.getElementById('messages');
      const div = document.createElement('div');
      div.className = 'typing';
      div.id = 'typing-indicator';
      div.innerHTML = '<span></span><span></span><span></span>';
      container.appendChild(div);
      container.scrollTop = container.scrollHeight;
    }

    function hideTyping() {
      const el = document.getElementById('typing-indicator');
      if (el) el.remove();
    }

    async function sendToWebhook(message) {
      showTyping();
      document.getElementById('sendBtn').disabled = true;

      try {
        const res = await fetch(WEBHOOK_URL, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ sessionId, message, metadata })
        });

        hideTyping();

        if (!res.ok) {
          const errText = await res.text();
          addMessage('Erro: ' + res.status + ' — ' + errText, 'error');
          return;
        }

        const data = await res.json();
        const reply = data.response || data.output || data.text || '(sem resposta)';
        addMessage(reply, 'bot');
      } catch (err) {
        hideTyping();
        addMessage('Erro de conexao: ' + err.message, 'error');
      } finally {
        document.getElementById('sendBtn').disabled = false;
        document.getElementById('msgInput').focus();
      }
    }

    function sendMessage() {
      const input = document.getElementById('msgInput');
      const text = input.value.trim();
      if (!text) return;

      addMessage(text, 'user');
      input.value = '';
      // After first message, stop sending metadata
      metadata = {};
      sendToWebhook(text);
    }
  </script>

</body>
</html>
